name: Credential bridge proof

# The pitch, executed in public: a fresh sandbox (this runner) gets a working
# agent environment in one step — secrets, skills, provider context — and
# later steps can actually use it. Runs daily against the hosted registry.

on:
  push:
    branches: [main]
    paths: [".github/workflows/credential-bridge-proof.yml"]
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *" # daily: proves registry, tokens, crypto, CLI end to end

jobs:
  agent-environment:
    runs-on: ubuntu-latest
    steps:
      - name: BEFORE — the sandbox is empty
        run: |
          test -z "${DATABASE_URL:-}" && echo "no DATABASE_URL"
          test -z "${NPM_TOKEN:-}" && echo "no NPM_TOKEN"
          echo "an agent here cannot run tests or reach anything"

      - uses: Envo-sh/setup-envo@v1
        env:
          ENVO_TOKEN: ${{ secrets.ENVO_TOKEN }}
          ENVO_KEY: ${{ secrets.ENVO_KEY }}
        with:
          ref: envo-proof/ci-demo

      - name: AFTER — later steps have the environment
        run: |
          test -n "$DATABASE_URL" && echo "DATABASE_URL present (masked)"
          test -n "$NPM_TOKEN" && echo "NPM_TOKEN present (masked)"
          test -f .envo/skills/repo-conventions/SKILL.md && echo "skills on disk"
          test -f .envo/ENVIRONMENT.md && echo "agent context written"
          envo doctor
